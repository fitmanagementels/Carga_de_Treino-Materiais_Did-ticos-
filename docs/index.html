<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ajuste de Carga na Prática | Ebook Interativo</title>
  <style>
    :root {
      --black: #000;
      --graphite-950: #070707;
      --graphite-900: #0b0b0b;
      --graphite-850: #111;
      --graphite-800: #151515;
      --graphite-700: #242424;
      --graphite-600: #343434;
      --paper: #f2f3f6;
      --paper-2: #ffffff;
      --ink: #101010;
      --muted: #60636a;
      --lime: #dfff2f;
      --lime-2: #e3ff28;
      --line: rgba(223, 255, 47, 0.42);
      --danger: #ff5c5c;
      --ok: #41d888;
      --radius: 8px;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.26);
      --step: 8px;
      --max: 680px;
      color-scheme: dark light;
      font-family: Inter, Montserrat, Roboto, Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
      background: var(--black);
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--paper);
      background:
        linear-gradient(135deg, rgba(223, 255, 47, 0.08) 0 1px, transparent 1px 56px),
        radial-gradient(circle at 100% 0%, rgba(223, 255, 47, 0.08), transparent 28rem),
        var(--black);
      overflow-x: hidden;
    }

    button, input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:focus-visible,
    a:focus-visible,
    input:focus-visible {
      outline: 3px solid var(--lime);
      outline-offset: 3px;
    }

    .app {
      min-height: 100vh;
      padding-bottom: 104px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: rgba(0, 0, 0, 0.86);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .topbar-inner {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 10px 16px 12px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 44px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .x-mark {
      width: 34px;
      height: 34px;
      flex: 0 0 34px;
      background: var(--lime);
      clip-path: polygon(0 0, 100% 0, 72% 50%, 100% 100%, 0 100%, 30% 50%);
      position: relative;
      box-shadow: 0 0 22px rgba(223, 255, 47, 0.28);
    }

    .x-mark::after {
      content: "";
      position: absolute;
      inset: 8px 12px;
      background: var(--black);
      transform: skew(-18deg);
    }

    .brand-copy {
      min-width: 0;
    }

    .brand-copy strong {
      display: block;
      color: var(--paper);
      font-size: 0.86rem;
      line-height: 1.05;
      text-transform: uppercase;
      letter-spacing: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-copy span {
      display: block;
      color: rgba(242, 243, 246, 0.66);
      font-size: 0.72rem;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--paper);
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      position: relative;
    }

    .icon-btn[aria-pressed="true"] {
      background: var(--lime);
      color: var(--black);
      border-color: var(--lime);
    }

    .progress-shell {
      height: 8px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 10px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--lime);
      transition: width 220ms ease;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(242, 243, 246, 0.68);
      font-size: 0.72rem;
      margin-top: 8px;
    }

    .screen {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 18px 16px 32px;
    }

    .hero {
      min-height: calc(100vh - 120px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 32px;
      padding-top: 18px;
    }

    .hero-visual {
      position: relative;
      min-height: 220px;
      border: 1px solid rgba(223, 255, 47, 0.28);
      background:
        linear-gradient(135deg, rgba(223, 255, 47, 0.15), transparent 32%),
        linear-gradient(180deg, #151515, #050505);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .hero-visual::before {
      content: "";
      position: absolute;
      inset: 22px;
      border: 1px solid rgba(223, 255, 47, 0.2);
      clip-path: polygon(0 0, 86% 0, 100% 18%, 100% 100%, 14% 100%, 0 82%);
    }

    .hero-x {
      position: absolute;
      right: -24px;
      top: 20px;
      width: 210px;
      height: 210px;
      background: var(--lime);
      clip-path: polygon(0 0, 100% 0, 70% 50%, 100% 100%, 0 100%, 30% 50%);
      opacity: 0.96;
    }

    .hero-x::after {
      content: "";
      position: absolute;
      inset: 42px 78px;
      background: #050505;
      transform: skew(-18deg);
    }

    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.05) 0,
        rgba(255, 255, 255, 0.05) 1px,
        transparent 1px,
        transparent 10px
      );
      opacity: 0.25;
      mix-blend-mode: screen;
      pointer-events: none;
    }

    .hero-panel {
      position: absolute;
      left: 18px;
      bottom: 18px;
      width: min(72%, 360px);
      padding: 14px;
      background: rgba(0, 0, 0, 0.76);
      border-left: 4px solid var(--lime);
      clip-path: polygon(0 0, 92% 0, 100% 18%, 100% 100%, 0 100%);
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      background: var(--lime);
      color: var(--black);
      font-size: 0.74rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      border-radius: 2px;
    }

    h1, h2, h3 {
      letter-spacing: 0;
      margin: 0;
    }

    .hero h1 {
      margin-top: 18px;
      font-size: clamp(2.6rem, 12vw, 5.5rem);
      line-height: 0.9;
      text-transform: uppercase;
      font-weight: 950;
      max-width: 11ch;
    }

    .hero-lead {
      margin: 18px 0 0;
      max-width: 32rem;
      color: rgba(242, 243, 246, 0.78);
      line-height: 1.55;
      font-size: 1rem;
    }

    .hero-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 22px;
      order: 9;
    }

    .btn {
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 16px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
    }

    .btn-primary {
      background: var(--lime);
      color: var(--black);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--paper);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .chapter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 22px;
    }

    .home-guide {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .home-guide-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      line-height: 1.45;
    }

    .home-guide-item span {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      background: var(--lime);
      color: var(--black);
      font-weight: 950;
      font-size: 0.82rem;
    }

    .chapter-tile {
      min-height: 96px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: var(--paper);
      border-radius: var(--radius);
      padding: 12px;
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 8px;
    }

    .chapter-tile strong {
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .chapter-tile span {
      color: var(--lime);
      font-size: 1.5rem;
      line-height: 1;
      font-weight: 950;
    }

    .chapter-tile.is-done {
      border-color: rgba(223, 255, 47, 0.45);
      background: rgba(223, 255, 47, 0.09);
    }

    .chapter {
      display: none;
    }

    .chapter.is-active,
    .home.is-active {
      display: block;
    }

    .home {
      display: none;
    }

    .chapter-head {
      min-height: 240px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(223, 255, 47, 0.18), transparent 36%),
        var(--graphite-900);
      border: 1px solid rgba(223, 255, 47, 0.22);
      border-radius: var(--radius);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 14px;
    }

    .chapter-head::after {
      content: attr(data-num);
      position: absolute;
      right: -12px;
      top: 18px;
      color: rgba(223, 255, 47, 0.16);
      font-size: 8rem;
      line-height: 0.8;
      font-weight: 950;
    }

    .chapter-head h2 {
      position: relative;
      z-index: 1;
      font-size: clamp(2rem, 9vw, 4.5rem);
      line-height: 0.92;
      text-transform: uppercase;
      font-weight: 950;
      max-width: 10ch;
    }

    .chapter-head p {
      position: relative;
      z-index: 1;
      color: rgba(242, 243, 246, 0.8);
      line-height: 1.45;
      margin: 0;
      max-width: 32rem;
    }

    .section-stack {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      border-radius: var(--radius);
      background: var(--paper);
      color: var(--ink);
      padding: 18px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .panel.dark {
      background: var(--graphite-850);
      color: var(--paper);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .panel.lime {
      background: var(--lime);
      color: var(--black);
    }

    .section-label {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      background: var(--black);
      color: var(--lime);
      font-size: 0.72rem;
      font-weight: 900;
      text-transform: uppercase;
      border-radius: 2px;
      margin-bottom: 12px;
    }

    .panel.dark .section-label {
      background: var(--lime);
      color: var(--black);
    }

    .panel h3 {
      font-size: 1.25rem;
      line-height: 1.12;
      text-transform: uppercase;
      margin-bottom: 12px;
      font-weight: 950;
    }

    .panel p {
      margin: 0 0 12px;
      line-height: 1.58;
      color: inherit;
    }

    .panel p:last-child {
      margin-bottom: 0;
    }

    .idea-card {
      display: grid;
      grid-template-columns: 4px 1fr;
      gap: 12px;
      align-items: stretch;
      font-size: 1.18rem;
      line-height: 1.35;
      font-weight: 850;
    }

    .idea-card::before {
      content: "";
      background: var(--lime);
      border-radius: 999px;
    }

    .def-grid,
    .button-grid,
    .action-grid,
    .signal-grid {
      display: grid;
      gap: 10px;
    }

    .mini-card,
    .action-card,
    .signal-card {
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.66);
      border-radius: var(--radius);
      padding: 14px;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
      width: 100%;
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .mini-card:hover,
    .action-card:hover,
    .signal-card:hover,
    .mini-card:focus-visible,
    .action-card:focus-visible,
    .signal-card:focus-visible {
      border-color: rgba(223, 255, 47, 0.76);
      transform: translateY(-1px);
    }

    .card-hint {
      margin-top: 8px;
      color: rgba(0, 0, 0, 0.48);
      font-size: 0.76rem;
      font-weight: 850;
      text-transform: uppercase;
    }

    .card-hint::after {
      content: " +";
      color: var(--lime);
      font-weight: 950;
    }

    .panel.dark .card-hint {
      color: rgba(242, 243, 246, 0.52);
    }

    .panel.dark .mini-card,
    .panel.dark .action-card,
    .panel.dark .signal-card {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .mini-card strong,
    .action-card strong,
    .signal-card strong {
      display: block;
      color: inherit;
      line-height: 1.18;
      margin-bottom: 8px;
      font-weight: 950;
    }

    .mini-card span,
    .action-card span,
    .signal-card span {
      color: var(--muted);
      line-height: 1.45;
      display: block;
    }

    .panel.dark .mini-card span,
    .panel.dark .action-card span,
    .panel.dark .signal-card span {
      color: rgba(242, 243, 246, 0.72);
    }

    .action-card {
      border-left: 4px solid var(--lime);
    }

    .action-meta {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .action-meta div {
      background: rgba(0, 0, 0, 0.04);
      padding: 10px;
      border-radius: 6px;
      line-height: 1.45;
    }

    .panel.dark .action-meta div {
      background: rgba(255, 255, 255, 0.07);
    }

    .example {
      border-left: 4px solid var(--lime);
      padding-left: 14px;
    }

    .checklist {
      display: grid;
      gap: 10px;
    }

    .check-item {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.04);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .check-icon {
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      background: var(--lime);
      color: var(--black);
      font-weight: 950;
      line-height: 1;
      clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
    }

    .check-item span {
      line-height: 1.35;
    }

    .phrase-list {
      display: grid;
      gap: 10px;
    }

    .phrase {
      padding: 14px;
      border-left: 4px solid var(--lime);
      background: rgba(0, 0, 0, 0.05);
      border-radius: 0 var(--radius) var(--radius) 0;
      line-height: 1.48;
      font-weight: 750;
    }

    .panel.dark .phrase {
      background: rgba(255, 255, 255, 0.06);
    }

    .quiz-options {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .quiz-set {
      display: grid;
      gap: 12px;
      padding: 14px 0;
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .quiz-set:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .quiz-set h3 {
      margin-bottom: 0;
    }

    .quiz-option {
      min-height: 52px;
      border-radius: var(--radius);
      border: 1px solid rgba(0, 0, 0, 0.12);
      background: var(--paper-2);
      color: var(--ink);
      padding: 12px;
      text-align: left;
      line-height: 1.35;
    }

    .quiz-option.is-selected {
      border-color: var(--lime);
      box-shadow: inset 0 0 0 2px var(--lime);
    }

    .quiz-option.is-correct {
      border-color: var(--ok);
      background: rgba(65, 216, 136, 0.16);
    }

    .quiz-option.is-wrong {
      border-color: var(--danger);
      background: rgba(255, 92, 92, 0.12);
    }

    .feedback {
      min-height: 44px;
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius);
      display: none;
      line-height: 1.45;
    }

    .feedback.is-visible {
      display: block;
      background: rgba(223, 255, 47, 0.16);
      border: 1px solid rgba(223, 255, 47, 0.35);
    }

    .recap {
      display: grid;
      gap: 10px;
    }

    .recap-line {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      line-height: 1.45;
    }

    .recap-line::before {
      content: "";
      width: 12px;
      height: 12px;
      margin-top: 5px;
      flex: 0 0 12px;
      background: var(--lime);
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
    }

    .complete-card {
      display: grid;
      gap: 12px;
      margin-top: 16px;
      padding: 16px;
      background: rgba(223, 255, 47, 0.1);
      border: 1px solid rgba(223, 255, 47, 0.32);
      border-radius: var(--radius);
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.9);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(18px);
    }

    .bottom-inner {
      width: min(100%, var(--max));
      margin: 0 auto;
      padding: 10px 16px;
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 10px;
      align-items: center;
    }

    .chapter-menu-btn,
    .chapter-menu-label {
      min-width: 0;
      height: 48px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.05);
      color: var(--paper);
      padding: 0 12px;
      font-weight: 800;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chapter-menu-btn::after {
      content: "⌃";
      margin-left: 10px;
      color: var(--lime);
    }

    .chapter-menu-label {
      opacity: 0.72;
      cursor: default;
    }

    .chapter-menu {
      position: fixed;
      left: 50%;
      bottom: 78px;
      width: min(calc(100% - 32px), var(--max));
      transform: translateX(-50%);
      z-index: 45;
      padding: 14px;
      border-radius: var(--radius);
      background: rgba(7, 7, 7, 0.98);
      border: 1px solid rgba(223, 255, 47, 0.34);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.56);
      display: none;
    }

    .chapter-menu.is-open {
      display: block;
    }

    .chapter-menu-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chapter-menu-head strong {
      text-transform: uppercase;
      color: var(--lime);
      font-size: 0.82rem;
    }

    .chapter-menu-close {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.06);
      color: var(--paper);
      font-weight: 950;
    }

    .chapter-menu-list {
      display: grid;
      gap: 8px;
      max-height: 58vh;
      overflow: auto;
    }

    .chapter-menu-item {
      min-height: 54px;
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.04);
      color: var(--paper);
      padding: 10px;
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      font-weight: 850;
    }

    .chapter-menu-item span {
      color: var(--lime);
      font-size: 1.15rem;
      font-weight: 950;
    }

    .chapter-menu-item.is-active {
      background: var(--lime);
      color: var(--black);
      border-color: var(--lime);
    }

    .chapter-menu-item.is-active span {
      color: var(--black);
    }

    .popup-layer {
      position: fixed;
      inset: 0;
      z-index: 90;
      display: none;
      place-items: center;
      padding: 18px 22px calc(88px + env(safe-area-inset-bottom));
      overflow: hidden;
    }

    .popup-layer.is-open {
      display: grid;
    }

    .popup-backdrop {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 20%, rgba(223, 255, 47, 0.16), transparent 34%),
        rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(10px);
    }

    .popup-card {
      position: relative;
      box-sizing: border-box;

    let state = loadState();

    function loadState() {
      try {
        const loaded = { ...defaultState, ...JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}") };
        loaded.quiz = Object.fromEntries(
          Object.entries(loaded.quiz || {}).filter(([key]) => /^\d+-\d+$/.test(key))
        );
        return normalizeState(loaded);
      } catch {
        return { ...defaultState };
      }
    }

    function normalizeState(value) {
      const normalized = { ...defaultState, ...value };
      if (typeof normalized.page !== "number" || normalized.page < 0 || normalized.page >= pageOrder.length) {
        normalized.page = pageFromView(normalized.view, normalized.chapter);
      }
      syncViewFromPage(normalized);
      return normalized;
    }

    function pageFromView(view, chapterId) {
      if (view === "home") return 0;
      if (view === "finish") return pageOrder.length - 1;
      const index = pageOrder.indexOf(chapterId);
      return index >= 0 ? index : 0;
    }

    function syncViewFromPage(target = state) {
      const page = pageOrder[target.page] ?? "home";
      if (page === "home") {
        target.view = "home";
        target.chapter = 1;
      } else if (page === "finish") {
        target.view = "finish";
      } else {
        target.view = "chapter";
        target.chapter = page;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function popupButton(className, title, content, hint, popupContext) {
      const popupTitleText = popupContext || title;
      return `
        <button class="${className}" type="button" data-popup-title="${escapeHTML(popupTitleText)}" data-popup-text="${escapeHTML(content)}">
          <strong>${escapeHTML(title)}</strong>
          ${hint ? `<div class="card-hint">${escapeHTML(hint)}</div>` : ""}
        </button>
      `;
    }

    function openInfoPopup(title, text) {
      popupTitle.textContent = title;
      popupText.textContent = text;
      infoPopup.classList.add("is-open");
      infoPopup.setAttribute("aria-hidden", "false");
      document.body.classList.add("popup-open");
      infoPopupClose.focus();
    }

    function closeInfoPopup() {
      infoPopup.classList.remove("is-open");
      infoPopup.setAttribute("aria-hidden", "true");
      document.body.classList.remove("popup-open");
    }

    function bindInfoPopups() {
      root.querySelectorAll("[data-popup-title]").forEach(btn => {
        btn.addEventListener("click", () => openInfoPopup(btn.dataset.popupTitle, btn.dataset.popupText));
      });
    }

    function setView(view, chapterId = state.chapter) {
      state.view = view;

      state.page = pageFromView(view, chapterId);

      closeChapterMenu();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getQuizzes(chapter) {
      return [chapter.quiz, ...(extraQuizBank[chapter.id] || [])];
    }

    function answeredQuizCount() {
      return Object.keys(state.quiz).filter(key => state.quiz[key] !== undefined).length;
    }

    function totalQuizCount() {
      return chapters.reduce((sum, chapter) => sum + getQuizzes(chapter).length, 0);
    }

    function completionPercent() {
      const doneChapters = Object.values(state.completed).filter(Boolean).length;
      const total = chapters.length + totalQuizCount();
      return Math.round(((doneChapters + answeredQuizCount()) / total) * 100);
    }

    function updateMeta() {
      const percent = completionPercent();
      const doneQuizzes = answeredQuizCount();
      progressFill.style.width = `${percent}%`;
      progressText.textContent = `${percent}% concluído`;
      quizText.textContent = `${doneQuizzes} decisões treinadas`;

      if (state.view === "home") {
        chapterMeta.textContent = "Capítulo inicial";
        prevBtn.disabled = true;
        nextBtn.disabled = false;
        chapterMenuBtn.className = "chapter-menu-label";
        chapterMenuBtn.textContent = "Capa e instruções";
        chapterMenuBtn.disabled = true;
      } else if (state.view === "finish") {
        chapterMeta.textContent = "Finalização";
        prevBtn.disabled = false;
        nextBtn.disabled = true;
        chapterMenuBtn.className = "chapter-menu-btn";
        chapterMenuBtn.textContent = "Finalização";
        chapterMenuBtn.disabled = false;
      } else {
        chapterMeta.textContent = `Capítulo ${state.chapter} de ${chapters.length}`;
        prevBtn.disabled = false;
        nextBtn.disabled = false;
        const chapter = chapters.find(ch => ch.id === state.chapter);
        chapterMenuBtn.className = "chapter-menu-btn";
        chapterMenuBtn.textContent = chapter ? `${chapter.id}. ${chapter.title}` : "Capítulos";
        chapterMenuBtn.disabled = false;
      }
    }

    function buildMenu() {
      chapterMenuList.innerHTML = `
        <button class="chapter-menu-item ${state.view === "home" ? "is-active" : ""}" type="button" data-home="true">
          <span>00</span>
          <strong>Introdução</strong>
        </button>
      ` + chapters.map(ch => `
        <button class="chapter-menu-item ${state.view === "chapter" && state.chapter === ch.id ? "is-active" : ""}" type="button" data-go="${ch.id}">
          <span>${String(ch.id).padStart(2, "0")}</span>
          <strong>${escapeHTML(ch.title)}</strong>
        </button>
      `).join("") + `
        <button class="chapter-menu-item ${state.view === "finish" ? "is-active" : ""}" type="button" data-finish="true">
          <span>✓</span>
          <strong>Finalização</strong>
        </button>
      `;

      const homeMenuBtn = chapterMenuList.querySelector("[data-home]");
      homeMenuBtn.addEventListener("click", () => setView("home"));

      chapterMenuList.querySelectorAll("[data-go]").forEach(btn => {
        btn.addEventListener("click", () => setView("chapter", Number(btn.dataset.go)));
      });

      const finishBtn = chapterMenuList.querySelector("[data-finish]");
      finishBtn.addEventListener("click", () => setView("finish"));
    }

    function openChapterMenu() {
      if (state.view === "home") return;
      buildMenu();
      chapterMenu.classList.add("is-open");
      chapterMenu.setAttribute("aria-hidden", "false");
    }

    function closeChapterMenu() {
      chapterMenu.classList.remove("is-open");
      chapterMenu.setAttribute("aria-hidden", "true");
    }

    function currentPageIndex() {
      return state.page;
    }

    function goToPageIndex(index) {
      const safeIndex = Math.max(0, Math.min(index, pageOrder.length - 1));
      const page = pageOrder[safeIndex];
      if (page === "home") return setView("home");
      if (page === "finish") return setView("finish");
      return setView("chapter", page);
    }

    function renderHome() {
      const tiles = chapters.map(ch => `
        <button class="chapter-tile ${state.completed[ch.id] ? "is-done" : ""}" type="button" data-go="${ch.id}">
          <span>${String(ch.id).padStart(2, "0")}</span>
          <strong>${escapeHTML(ch.title)}</strong>
        </button>
      `).join("");

      root.innerHTML = `
        <section class="home is-active">
          <div class="hero">
            <div>
              <span class="kicker">Treinamento interno</span>
              <h1>Ajuste de Carga na Prática</h1>
              <p class="hero-lead">Um ebook interativo para treinar sua leitura da sessão, cruzar contexto, técnica e esforço, e decidir a menor mudança suficiente no atendimento real.</p>
            </div>
            <div class="hero-visual" aria-hidden="true">
              <div class="hero-x"></div>
              <div class="scanlines"></div>
              <div class="hero-panel">
                <span class="kicker">Pergunta-guia</span>
                <p style="margin:10px 0 0;line-height:1.3;font-weight:900;">O que está acontecendo agora e qual é a menor mudança suficiente?</p>
              </div>
            </div>
            ${panel("Como usar este ebook", "dark", `
              <div class="home-guide">
                <div class="home-guide-item"><span>1</span><div><strong>Siga a ordem se for seu primeiro contato.</strong><br>Use o botão "Começar estudo" para avançar do capítulo inicial até a síntese final.</div></div>
                <div class="home-guide-item"><span>2</span><div><strong>Use o mapa quando quiser revisar.</strong><br>Os blocos abaixo levam direto ao capítulo escolhido, sem precisar abrir menu.</div></div>
                <div class="home-guide-item"><span>3</span><div><strong>Toque nos cards durante a leitura.</strong><br>Eles mostram por que cada observação, sinal ou botão de ajuste importa na decisão.</div></div>
                <div class="home-guide-item"><span>4</span><div><strong>Responda às decisões rápidas.</strong><br>As perguntas finais treinam julgamento prático, não memorização de frase pronta.</div></div>
              </div>
            `)}
            <div>
              <span class="kicker">Mapa do ebook</span>
              <div class="chapter-grid">${tiles}</div>
            </div>
            <div class="hero-actions">
              <button class="btn btn-primary" type="button" data-go="1">Começar estudo</button>
              <button class="btn btn-secondary" type="button" id="resetBtn">Reiniciar progresso</button>
            </div>
          </div>
        </section>
      `;

      root.querySelectorAll("[data-go]").forEach(btn => {
        btn.addEventListener("click", () => setView("chapter", Number(btn.dataset.go)));
      });

      root.querySelector("#resetBtn").addEventListener("click", () => {
        state = { ...defaultState };
        saveState();
        render();
      });
    }

    function renderChapter(chapter) {
      const s = chapter.sections;
      root.innerHTML = `
        <article class="chapter is-active">
          <header class="chapter-head" data-num="${String(chapter.id).padStart(2, "0")}">
            <span class="kicker">${escapeHTML(chapter.tag)}</span>
            <h2>${escapeHTML(chapter.title)}</h2>
            <p>${escapeHTML(chapter.lead)}</p>
          </header>
          <div class="section-stack">
            ${panel("Abertura", "dark", paragraphs(s.abertura))}
            ${panel("Ideia central", "lime", `<div class="idea-card"><div>${escapeHTML(s.ideia)}</div></div>`)}
            ${panel("O que você precisa entender", "", paragraphs(s.entender))}
            ${panel("Aprofunde a lógica", "dark", paragraphs(chapterDeepDive[chapter.id] || []))}
            ${definitionPanel(s.definicoes)}
            ${s.botões ? buttonsPanel(s.botões) : ""}
            ${s.actions ? actionPanel(s.actions) : ""}
            ${s.signals ? signalPanel(s.signals) : ""}
            ${s.observe ? panel("Observe antes de ajustar", "", list(s.observe, chapter.id)) : ""}
            ${panel("Exemplo operacional", "dark", `<div class="example">${paragraphs(s.exemplo)}</div>`)}
            ${checklistPanel(s.checklist)}
            ${panel("Frases profissionais", "", `<div class="phrase-list">${s.frases.map(p => `<div class="phrase">${escapeHTML(p)}</div>`).join("")}</div>`)}
            ${panel("Cautela", "dark", paragraphs([s.cautela]))}
            ${panel("Recapitule", "", `<div class="recap">${s.recap.map(line => `<div class="recap-line">${escapeHTML(line)}</div>`).join("")}</div>`)}
            ${quizPanel(chapter)}
            <div class="complete-card">
              <strong>Fechamento do capítulo</strong>
              <span>Marque como concluído quando tiver lido, respondido às decisões rápidas e revisado o checklist.</span>
              <button class="btn btn-primary" type="button" id="completeBtn">${state.completed[chapter.id] ? "Capítulo concluído" : "Marcar como concluído"}</button>
            </div>
          </div>
        </article>
      `;

      root.querySelectorAll("[data-answer]").forEach(btn => {
        btn.addEventListener("click", () => handleQuiz(chapter.id, Number(btn.dataset.quiz), Number(btn.dataset.answer)));
      });

      bindInfoPopups();

      root.querySelector("#completeBtn").addEventListener("click", () => {
        state.completed[chapter.id] = true;
        saveState();
        render();
      });
    }

    function panel(label, mode, content) {
      return `
        <section class="panel ${mode}">
          <span class="section-label">${escapeHTML(label)}</span>
          ${content}
        </section>
      `;
    }

    function paragraphs(items) {
      return items.map(p => `<p>${escapeHTML(p)}</p>`).join("");
    }

    function explainItem(item, chapterId) {
      const lower = item.toLowerCase();
      if (lower.includes("aquecimento")) return "O aquecimento é a primeira validação prática da ficha. Ele mostra se a proposta planejada conversa com o estado real do aluno antes da série efetiva.";
      if (lower.includes("técnica") || lower.includes("execução")) return "A técnica mostra se a demanda ainda preserva o objetivo do exercício. Quando a qualidade cai, o ajuste deixa de ser detalhe e passa a proteger a intenção da série.";
      if (lower.includes("ritmo") || lower.includes("fluidez")) return "Ritmo e fluidez ajudam a perceber quando o esforço mudou. Não é uma medida exata, mas é uma pista forte para revisar a demanda.";
      if (lower.includes("amplitude")) return "Amplitude encurtando sem orientação pode indicar que a carga, a fadiga ou a insegurança estão mudando a execução.";
      if (lower.includes("intervalo") || lower.includes("recuper")) return "Às vezes o problema não é o peso, mas a recuperação insuficiente entre séries. O intervalo também é um botão de ajuste.";
      if (lower.includes("relato") || lower.includes("rpe") || lower.includes("rir")) return "O relato do aluno abre a conversa, mas precisa ser cruzado com o que você vê na execução e com o objetivo da série.";
      if (lower.includes("desconforto")) return "Desconforto incomum não é diagnóstico. É um alerta para ajustar, modificar ou interromper dentro do limite profissional do personal trainer.";
      if (lower.includes("comunicação") || lower.includes("explicar")) return "Comunicar bem evita que o ajuste pareça improviso. O aluno precisa perceber observação, motivo e ação.";
      if (chapterId === 1) return "Essa pergunta ajuda a comparar a ficha com a realidade do atendimento. O foco é decidir se o plano ainda faz sentido hoje.";
      if (chapterId === 5) return "Esse item ajuda a escolher qual botão mexer primeiro, sem perder a referência do treino.";
      if (chapterId === 6) return "Esse sinal não decide sozinho, mas ajuda a compor o quadro de fadiga e qualidade de movimento.";
      return "Use este ponto como pista operacional. Ele não decide sozinho, mas ajuda a formar uma leitura mais segura da sessão.";
    }

    function list(items, chapterId) {
      return `<div class="def-grid">${items.map(item => `
        ${popupButton("mini-card", item, explainItem(item, chapterId), "Toque para entender")}
      `).join("")}</div>`;
    }

    function definitionPanel(defs) {
      return panel("Definição rápida", "", `
        <div class="def-grid">
          ${defs.map(([title, text]) => `
            <button class="mini-card" type="button" data-popup-title="${escapeHTML(title)}" data-popup-text="${escapeHTML(explainItem(`${title} ${text}`, 0))}">
              <strong>${escapeHTML(title)}</strong>
              <span>${escapeHTML(text)}</span>
              <div class="card-hint">Toque para contextualizar</div>
            </button>
          `).join("")}
        </div>
      `);
    }

    function buttonsPanel(buttons) {
      return panel("Botões de ajuste", "dark", `
        <div class="button-grid">
          ${buttons.map(([title, text]) => `
            <button class="mini-card" type="button" data-popup-title="${escapeHTML(title)}" data-popup-text="${escapeHTML(explainItem(`${title} ${text}`, 2))}">
              <strong>${escapeHTML(title)}</strong>
              <span>${escapeHTML(text)}</span>
              <div class="card-hint">Toque para aplicar</div>
            </button>
          `).join("")}
        </div>
      `);
    }

    function actionPanel(actions) {
      return panel("Cards de ação", "dark", `
        <div class="action-grid">
          ${actions.map(([title, when, action, caution]) => `
            <button class="action-card" type="button" data-popup-title="${escapeHTML(title)}" data-popup-text="${escapeHTML(explainItem(`${title} ${when} ${action}`, 5))}">
              <strong>${escapeHTML(title)}</strong>
              <div class="action-meta">
                <div><b>Quando aparece:</b> ${escapeHTML(when)}</div>
                <div><b>Ajuste possível:</b> ${escapeHTML(action)}</div>
                <div><b>Cautela:</b> ${escapeHTML(caution)}</div>
              </div>
              <div class="card-hint">Toque para entender a decisão</div>
            </button>
          `).join("")}
        </div>
      `);
    }

    function signalPanel(signals) {
      return panel("Radar de sinais", "dark", `
        <div class="signal-grid">
          ${signals.map(([title, text]) => `
            <button class="signal-card" type="button" data-popup-title="${escapeHTML(title)}" data-popup-text="${escapeHTML(explainItem(`${title} ${text}`, 6))}">
              <strong>${escapeHTML(title)}</strong>
              <span>${escapeHTML(text)}</span>
              <div class="card-hint">Toque para interpretar</div>
            </button>
          `).join("")}
        </div>
      `);
    }

    function checklistPanel(items) {
      return panel("Checklist de estudo", "", `
        <div class="checklist">
          ${items.map(item => `
            <div class="check-item">
              <span class="check-icon">✓</span>
              <span>${escapeHTML(item)}</span>
            </div>
          `).join("")}
        </div>
      `);
    }

    function quizPanel(chapter) {
      const quizzes = getQuizzes(chapter);
      return panel("Decisões rápidas", "", `
        ${quizzes.map((quiz, quizIndex) => {
          const key = `${chapter.id}-${quizIndex}`;
          const selected = state.quiz[key];
          const feedbackVisible = selected !== undefined;
          return `
            <div class="quiz-set">
              <h3>${escapeHTML(quiz.question)}</h3>
              <div class="quiz-options">
                ${quiz.options.map((option, optionIndex) => {
                  let cls = "";
                  if (selected !== undefined) {
                    if (optionIndex === quiz.answer) cls = "is-correct";
                    else if (optionIndex === selected) cls = "is-wrong";
                  }
                  return `<button class="quiz-option ${cls}" type="button" data-quiz="${quizIndex}" data-answer="${optionIndex}">${escapeHTML(option)}</button>`;
                }).join("")}
              </div>
              <div class="feedback ${feedbackVisible ? "is-visible" : ""}">${feedbackVisible ? escapeHTML(quiz.feedback) : ""}</div>
            </div>
          `;
        }).join("")}
      `);
    }

    function handleQuiz(chapterId, quizIndex, answer) {
      state.quiz[`${chapterId}-${quizIndex}`] = answer;
      saveState();
      render();
    }

    function renderFinish() {
      root.innerHTML = `
        <section class="finish-panel is-active">
          <div class="finish-card">
            <span class="kicker">Finalização</span>
            <h2>Leitura antes da carga</h2>
            <p>Este ebook não foi feito para decorar respostas prontas. Ele foi feito para treinar um modo de raciocinar: olhar para o aluno real, interpretar a execução e ajustar a demanda com critério.</p>
            <p>A ficha continua importante, mas ela é ponto de partida. O atendimento exige comparar contexto, técnica, relato de esforço, sinais de fadiga e objetivo da série.</p>
            <p><strong>Pergunta-guia:</strong> o que está acontecendo agora e qual é a menor mudança suficiente?</p>
          </div>
          ${panel("Resumo operacional", "", `
            <div class="recap">
              <div class="recap-line">Ajuste não é improviso quando nasce de observação, motivo e ação.</div>
              <div class="recap-line">RPE e RIR ajudam a conversar, mas a técnica observada calibra a decisão.</div>
              <div class="recap-line">Sinais visuais são pistas, não medidas de precisão.</div>
              <div class="recap-line">A menor mudança suficiente protege a referência do treino.</div>
              <div class="recap-line">Comunicar bem o ajuste faz parte da postura profissional.</div>
            </div>
          `)}
          <div class="complete-card">
            <strong>Mensagem final</strong>
            <span>Use este material como base de estudo. Na prática, a habilidade amadurece quando você observa, decide, comunica e depois refina sua leitura com supervisão e experiência.</span>
            <button class="btn btn-primary" type="button" data-go="1">Revisar desde o início</button>
          </div>
        </section>
      `;

      root.querySelector("[data-go]").addEventListener("click", () => setView("chapter", 1));
    }

    function render() {
      if (state.view === "home") {
        renderHome();
      } else if (state.view === "finish") {
        renderFinish();
      } else {
        const chapter = chapters.find(ch => ch.id === state.chapter) || chapters[0];
        renderChapter(chapter);
      }
      updateMeta();
    }

    prevBtn.addEventListener("click", () => {
      goToPageIndex(currentPageIndex() - 1);
    });

    nextBtn.addEventListener("click", () => {
      goToPageIndex(currentPageIndex() + 1);
    });

    homeBtn.addEventListener("click", () => setView("home"));

    chapterMenuBtn.addEventListener("click", openChapterMenu);
    chapterMenuClose.addEventListener("click", closeChapterMenu);
    chapterMenu.addEventListener("click", event => {
      if (event.target === chapterMenu) closeChapterMenu();
    });

    infoPopupClose.addEventListener("click", closeInfoPopup);
    infoPopupBackdrop.addEventListener("click", closeInfoPopup);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") {
        closeInfoPopup();
        closeChapterMenu();
      }
    });

    render();
  </script>
</body>
</html>
